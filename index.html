    body {

      background: #0d0d0d;

    }

    .container {
      max-width: 400px;

      padding: 20px;

    /* GOLD GLOW BORDER */
    .profile-wrap {
      width: 140px;
      height: 140px;
      margin: 50px auto 15px;
      border-radius: 50%;
      padding: 4px;
      background: linear-gradient(45deg, #FFD700, #FFA500, #FFD700);

    .profile-wrap img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }

    @keyframes rotateGlow {
      0% { filter: drop-shadow(0 0 5px gold); }
      50% { filter: drop-shadow(0 0 20px orange); }
      100% { filter: drop-shadow(0 0 5px gold); }
    }

      border-radius: 10px;
      text-decoration: none;
      margin-bottom: 12px;
      transition: 0.3s ease;
      font-size: 15px;
    }

    /* WhatsApp Button */
    .whatsapp {
      background: #25D366;
      color: #fff;
      font-weight: bold;
    }

    .whatsapp:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #25D366;
    }

    /* Social Buttons */
    .social {
      background: #1a1a1a;
      color: #fff;
      border: 1px solid #333;
    }

    .social:hover {

</head>
